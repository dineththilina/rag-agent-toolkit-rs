# Copy this to config.toml, or just complete the setup screen in the browser
# (which writes config.toml for you). Every field has a default.

# Any OpenAI-compatible API base URL.
#   OpenAI:    https://api.openai.com/v1
#   Groq:      https://api.groq.com/openai/v1
#   Together:  https://api.together.xyz/v1
#   OpenRouter:https://openrouter.ai/api/v1
#   Ollama:    http://localhost:11434/v1
#   LM Studio: http://localhost:1234/v1
api_base = "https://api.openai.com/v1"

# API key. Leave empty for Ollama / LM Studio.
api_key = ""

# Chat model id (must exist on the chosen API — the UI fetches the live list).
model = "gpt-4o-mini"

# Legacy OpenAI-style embedding endpoint fields. Unused by the local vector RAG
# (embeddings run locally via fastembed); kept only for config compatibility.
embeddings_base  = ""
embeddings_key   = ""
embeddings_model = "text-embedding-3-small"

# Directory of documents to ingest.
data_dir = "data"

# ── Local vector RAG ─────────────────────────────────────────────────────────
# Retrieval mode: "keyword" (BM25 only), "vector" (semantic only), or "hybrid".
retrieval_mode = "hybrid"

# How many chunks to retrieve.
top_k = 8

# Minimum cosine similarity (0..1) for a vector hit to count as confident
# evidence. Below this, the assistant says it couldn't find enough evidence.
min_similarity = 0.2

# Local embedding model (fastembed). all-MiniLM-L6-v2 is a small English
# retrieval model with 384 dimensions. Other options: "bge-small-en-v1.5".
embedding_model = "all-MiniLM-L6-v2"
embedding_dim   = 384

# Local, on-disk vector database (SQLite + sqlite-vec). No cloud, no Docker.
# Delete this file or POST /api/rebuild to recreate the index.
vector_db_path = "data/rag_vectors.sqlite"
